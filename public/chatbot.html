<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>문의 챗봇 | 자취생의 모든것</title>
    <link rel="stylesheet" href="styles.css?v=pages-3" />
  </head>
  <body data-tool="chatbot">
    <header class="app-header">
      <div>
        <p class="eyebrow">Support</p>
        <h1>문의 챗봇</h1>
        <p class="subtitle">로그인, 냉장고 재료 털기, 관리자 기능, 자취 장바구니 같은 단순 문의를 자동으로 답합니다.</p>
      </div>
      <nav class="app-nav" aria-label="main navigation">
        <a class="nav-link" href="index.html">냉장고 재료 털기</a>
        <a class="nav-link" href="login.html">로그인</a>
        <a class="nav-link" href="register.html">회원가입</a>
        <a class="nav-link active" href="chatbot.html">문의 챗봇</a>
        <a class="nav-link" href="notes.html">메모장</a>
        <a class="nav-link" href="shopping.html">자취 장바구니</a>
        <a class="nav-link" href="places.html">놀곳추천</a>
        <a class="nav-link" href="tips.html">꿀팁방출기</a>
      </nav>
    </header>

    <main class="tool-layout">
      <section class="panel tool-panel chat-panel" aria-labelledby="chatTitle">
        <div class="section-heading">
          <p class="eyebrow">Auto Reply</p>
          <h2 id="chatTitle">무엇을 도와드릴까요?</h2>
        </div>

        <div id="chatMessages" class="chat-window" aria-live="polite"></div>

        <form id="chatForm" class="chat-form">
          <label for="chatInput">문의 내용</label>
          <div class="chat-input-row">
            <input id="chatInput" name="message" type="text" maxlength="500" autocomplete="off" required />
            <button type="submit" class="primary-button">전송</button>
          </div>
        </form>
      </section>

      <aside class="panel tool-side-panel" aria-labelledby="quickTitle">
        <div class="section-heading">
          <p class="eyebrow">Quick Ask</p>
          <h2 id="quickTitle">빠른 질문</h2>
        </div>
        <div class="quick-question-list">
          <button type="button" class="secondary-button" data-chat-prompt="냉장고 재료 털기는 어떻게 해?">재료 털기</button>
          <button type="button" class="secondary-button" data-chat-prompt="자취 필수품 알려줘">자취 필수품</button>
          <button type="button" class="secondary-button" data-chat-prompt="서울에서 자취생이 가볼 만한 곳 알려줘">놀곳추천</button>
          <button type="button" class="secondary-button" data-chat-prompt="전입신고랑 확정일자는 어떻게 챙겨?">자취 서류</button>
          <button type="button" class="secondary-button" data-chat-prompt="관리자는 무엇을 할 수 있어?">관리자 기능</button>
          <button type="button" class="secondary-button" data-chat-prompt="메모장은 어디에 저장돼?">메모 저장</button>
        </div>
      </aside>
    </main>

    <script src="tools.js?v=pages-3" type="module"></script>
  </body>
</html>
