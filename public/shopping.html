<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>자취 장바구니 | 냉장고 재료</title>
    <link rel="stylesheet" href="styles.css?v=pages-1" />
  </head>
  <body data-tool="shopping">
    <header class="app-header">
      <div>
        <p class="eyebrow">Living Alone</p>
        <h1>자취 장바구니</h1>
        <p class="subtitle">처음 자취할 때 빠뜨리기 쉬운 필수품을 체크하고 쇼핑몰 검색 링크로 바로 비교합니다.</p>
      </div>
      <nav class="app-nav" aria-label="main navigation">
        <a class="nav-link" href="index.html">추천</a>
        <a class="nav-link" href="chatbot.html">문의 챗봇</a>
        <a class="nav-link" href="notes.html">메모장</a>
        <a class="nav-link active" href="shopping.html">자취 장바구니</a>
      </nav>
    </header>

    <main class="tool-layout shopping-layout">
      <section class="panel tool-panel" aria-labelledby="shoppingTitle">
        <div class="section-heading">
          <p class="eyebrow">Checklist</p>
          <h2 id="shoppingTitle">필수품 체크리스트</h2>
        </div>
        <div id="shoppingCategories" class="shopping-categories"></div>
      </section>

      <aside class="panel tool-side-panel" aria-labelledby="basketTitle">
        <div class="section-heading">
          <p class="eyebrow">Basket</p>
          <h2 id="basketTitle">내 장바구니</h2>
        </div>
        <div class="metric-block compact-metric">
          <span class="metric-label">선택한 항목</span>
          <strong id="basketCount">0개</strong>
        </div>
        <div id="basketList" class="data-list"></div>
        <div class="button-row compact-row">
          <button type="button" id="addBasketNoteButton" class="primary-button">메모장에 추가</button>
          <button type="button" id="clearBasketButton" class="secondary-button">전체 해제</button>
        </div>
        <form id="customShoppingForm" class="custom-shopping-form">
          <label>
            추가로 찾을 물품
            <input id="customShoppingInput" type="text" maxlength="80" placeholder="예: 전자레인지용 용기" />
          </label>
          <button type="submit" class="secondary-button">검색 메모 추가</button>
        </form>
        <div id="shoppingMessage" class="inline-message" role="status"></div>
        <p class="muted-copy">링크는 각 쇼핑몰의 검색 결과로 이동합니다. 가격과 배송 조건은 구매 전에 직접 확인하세요.</p>
      </aside>
    </main>

    <script src="tools.js?v=pages-1" type="module"></script>
  </body>
</html>
